<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - Velox0</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="canonical" href="https://velox0.com/projects" />
    <meta name="google-adsense-account" content="ca-pub-6822765610246222" />
    <meta property="og:title" content="Velox0's Projects" />
    <meta
      property="og:description"
      content="A collection of my projects from GitHub — mostly backend tools and microservices."
    />
    <meta property="og:url" content="https://velox0.com/projects" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/projects.css" />

    <meta
      name="description"
      content="A collection of my projects from GitHub — mostly backend tools and microservices."
    />
    <meta
      name="keywords"
      content="velox0,github,projects,code,programming,software,development,3d artist,backend,back-end,developer,engineer,computer science,intern,velox,velox0,systems"
    />
  </head>

  <body>
    <div id="app">
      <div><a href="/" class="nostyle">← Home</a></div>
      <h1 class="h">Projects</h1>
      <div
        class="projects-container"
        id="projects-container"
        style="
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: left;
          justify-content: center;
        "
      >
        <div style="opacity: 0.5; padding: 20px 40px">loading projects...</div>
      </div>
    </div>

    <script>
      function timeAgo(dateStr) {
        const now = new Date();
        const date = new Date(dateStr);
        const seconds = Math.floor((now - date) / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const weeks = Math.floor(days / 7);
        const months = Math.floor(days / 30);
        const years = Math.floor(days / 365);

        if (years > 0) return years === 1 ? "1 year ago" : years + " years ago";
        if (months > 0)
          return months === 1 ? "1 month ago" : months + " months ago";
        if (weeks > 0) return weeks === 1 ? "1 week ago" : weeks + " weeks ago";
        if (days > 0) return days === 1 ? "1 day ago" : days + " days ago";
        if (hours > 0) return hours === 1 ? "1 hour ago" : hours + " hours ago";
        if (minutes > 0)
          return minutes === 1 ? "1 minute ago" : minutes + " minutes ago";
        return "just now";
      }

      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      async function loadProjects() {
        const container = document.getElementById("projects-container");
        try {
          const res = await fetch("/api/projects");
          if (!res.ok) throw new Error("Failed to fetch projects");
          const repos = await res.json();

          container.innerHTML = "";

          // sort by pushed_at descending
          repos.sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

          repos.forEach((repo) => {
            const isStarred = repo.starred;
            const cardClass = "project-card" + (isStarred ? " starred" : "");

            let html = "";

            // Whole card wrapped in a nostyle link to github
            html +=
              '<a href="' +
              escapeHtml(repo.html_url) +
              '" class="nostyle"><div class="' +
              cardClass +
              '">';
            html +=
              '<div class="project-card-name">{ ' +
              escapeHtml(repo.full_name) +
              "</div><hr />";

            // homepage link
            if (repo.homepage) {
              html +=
                '<a class="" style="font-size:12px; line-height: 32px;" href="' +
                escapeHtml(repo.homepage) +
                '">[' +
                escapeHtml(repo.homepage) +
                "]</a>";
            }

            // description
            if (repo.description) {
              html +=
                '<div class="project-card-description" style="font-size: 12px; color: var(--color-text);">' +
                escapeHtml(repo.description) +
                "</div>";
            }

            // last pushed
            html +=
              '<span style="color:var(--color-text); font-size: small; opacity: 0.7;">last pushed: ' +
              timeAgo(repo.pushed_at) +
              "</span><br />";

            // language badge
            if (repo.language) {
              html +=
                '<span class="project-card-language" style="font-size: 12px;">' +
                escapeHtml(repo.language) +
                "</span>";
            }

            html += "\n            }</div></a>";

            container.innerHTML += html;
          });
        } catch (err) {
          container.innerHTML =
            '<div style="opacity: 0.5; padding: 20px 40px; color: red;">failed to load projects: ' +
            err.message +
            "</div>";
        }
      }

      loadProjects();
    </script>
  </body>
</html>
