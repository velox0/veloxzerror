  <body>
    <div id="app">
      <div><a href="/" class="nostyle">← Home</a></div>
      <h1 class="h">Projects</h1>
      <div
        class="projects-container"
        id="projects-container"
        style="
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: left;
          justify-content: center;
        "
      >
        <div style="opacity: 0.5; padding: 20px 40px">loading projects...</div>
      </div>
    </div>

    <div id="readme-container">
      <div id="readme-pane">
        <div id="readme-content">Hover over a project to see details...</div>
      </div>
    </div>

    <script>
      function timeAgo(dateStr) {
        const now = new Date();
        const date = new Date(dateStr);
        const seconds = Math.floor((now - date) / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const weeks = Math.floor(days / 7);
        const months = Math.floor(days / 30);
        const years = Math.floor(days / 365);

        if (years > 0) return years === 1 ? "1 year ago" : years + " years ago";
        if (months > 0)
          return months === 1 ? "1 month ago" : months + " months ago";
        if (weeks > 0) return weeks === 1 ? "1 week ago" : weeks + " weeks ago";
        if (days > 0) return days === 1 ? "1 day ago" : days + " days ago";
        if (hours > 0) return hours === 1 ? "1 hour ago" : hours + " hours ago";
        if (minutes > 0)
          return minutes === 1 ? "1 minute ago" : minutes + " minutes ago";
        return "just now";
      }

      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      let currentHoverRepo = null;
      let cacheReadme = {};
      let markedLoaded = false;
      const MARKED_LS_KEY = "marked_js_src";
      const MARKED_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

      async function ensureMarked() {
        if (markedLoaded) return;
        try {
          const cached = localStorage.getItem(MARKED_LS_KEY);
          if (cached) {
            const { src, savedAt } = JSON.parse(cached);
            if (Date.now() - savedAt < MARKED_TTL) {
              // Execute from cache — no network request
              new Function(src)();
              markedLoaded = true;
              return;
            }
          }
        } catch (_) {}
        // Fetch from local server API and cache the source
        const res = await fetch("/api/marked.js");
        const src = await res.text();
        try {
          localStorage.setItem(
            MARKED_LS_KEY,
            JSON.stringify({ src, savedAt: Date.now() }),
          );
        } catch (_) {}
        new Function(src)();
        markedLoaded = true;
      }

      async function showReadme(repoFullName, branch) {
        if (window.innerWidth < 1024) return; // Desktop only
        const pane = document.getElementById("readme-pane");
        const content = document.getElementById("readme-content");

        pane.classList.add("visible");

        if (currentHoverRepo === repoFullName) return;
        currentHoverRepo = repoFullName;

        if (cacheReadme[repoFullName]) {
          content.innerHTML = cacheReadme[repoFullName];
          return;
        }

        content.innerHTML =
          '<div style="opacity:0.5; font-family: monospace;">Fetching README...</div>';

        try {
          await ensureMarked();
          const baseUrl = `https://raw.githubusercontent.com/${repoFullName}/${branch}/`;
          const url = `${baseUrl}README.md`;
          const res = await fetch(url);
          if (!res.ok) throw new Error("No README");
          const text = await res.text();
          let html =
            typeof marked !== "undefined"
              ? marked.parse(text)
              : escapeHtml(text).replace(/\n/g, "<br>");

          // Rewrite relative paths for images and links to point to the raw GitHub source
          html = html.replace(
            /(src|href)=['"](?!http:\/\/|https:\/\/|data:|\/\/|#)(?:\.\/|\/)?([^'"]+)['"]/gi,
            `$1="${baseUrl}$2"`,
          );

          cacheReadme[repoFullName] = html;

          if (currentHoverRepo === repoFullName) {
            content.innerHTML = html;
          }
        } catch (e) {
          if (currentHoverRepo === repoFullName) {
            content.innerHTML =
              '<div style="opacity:0.5; font-family: monospace;">No README available for this project.</div>';
          }
        }
      }

      const PROJECTS_LS_KEY = "projects_cache";
      const PROJECTS_TTL = 5 * 60 * 1000; // 5 minutes

      function renderProjects(repos, container) {
        container.innerHTML = "";
        // sort by pushed_at descending
        repos.sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));
        repos.forEach((repo) => {
          const isStarred = repo.starred;
          const cardClass = "project-card" + (isStarred ? " starred" : "");
          let html = "";
          html +=
            '<a href="' +
            escapeHtml(repo.html_url) +
            '" class="nostyle" onmouseenter="showReadme(\'' +
            escapeHtml(repo.full_name) +
            "', '" +
            escapeHtml(repo.default_branch || "main") +
            '\')"><div class="' +
            cardClass +
            '">';
          html +=
            '<div class="project-card-name">{ ' +
            escapeHtml(repo.full_name) +
            "</div><hr />";
          if (repo.homepage) {
            html +=
              '<a class="" style="font-size:12px; line-height: 32px;" href="' +
              escapeHtml(repo.homepage) +
              '">[' +
              escapeHtml(repo.homepage) +
              "]</a>";
          }
          if (repo.description) {
            html +=
              '<div class="project-card-description" style="font-size: 12px; color: var(--color-text);">' +
              escapeHtml(repo.description) +
              "</div>";
          }
          html +=
            '<span style="color:var(--color-text); font-size: small; opacity: 0.7;">last pushed: ' +
            timeAgo(repo.pushed_at) +
            "</span><br />";
          if (repo.language) {
            html +=
              '<span class="project-card-language" style="font-size: 12px;">' +
              escapeHtml(repo.language) +
              "</span>";
          }
          html += "\n            }</div></a>";
          container.innerHTML += html;
        });
      }

      async function loadProjects() {
        const container = document.getElementById("projects-container");
        try {
          // Check localStorage cache first (5-minute TTL)
          try {
            const cached = localStorage.getItem(PROJECTS_LS_KEY);
            if (cached) {
              const { data, savedAt } = JSON.parse(cached);
              if (Date.now() - savedAt < PROJECTS_TTL) {
                renderProjects(data, container);
                return;
              }
            }
          } catch (_) {}

          const res = await fetch("/api/projects");
          if (!res.ok) throw new Error("Failed to fetch projects");
          const repos = await res.json();

          try {
            localStorage.setItem(
              PROJECTS_LS_KEY,
              JSON.stringify({ data: repos, savedAt: Date.now() }),
            );
          } catch (_) {}

          renderProjects(repos, container);
        } catch (err) {
          container.innerHTML =
            '<div style="opacity: 0.5; padding: 20px 40px; color: red;">failed to load projects: ' +
            err.message +
            "</div>";
        }
      }

      loadProjects();
    </script>
