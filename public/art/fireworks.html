  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div class="loader-text">loading</div>
    </div>
    <div class="art_page">
      <a class="back-link" href="/art">← Art</a>
      <h1>Lights</h1>
      <p class="art-description">Diwali - shoutout to my favorite festival!</p>
      <div class="art-showcase">
        <img
          alt="Diwali - shoutout to my favorite festival!"
          id="hero"
          src="/static/art/lights/lights.png"
        />
      </div>
    </div>
    <script>
      const img = document.getElementById("hero");
      const loader = document.getElementById("loader");
      if (img.complete) {
        loader.classList.add("done");
      } else {
        img.onload = () => loader.classList.add("done");
      }
      setTimeout(() => loader.classList.add("done"), 6000);
    </script>
  </body>
