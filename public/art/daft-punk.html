  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div class="loader-text">loading</div>
    </div>
    <div class="art_page">
      <a class="back-link" href="/art">← Art</a>
      <h1>Daft Punk</h1>
      <p class="art-description">Daft Punk - Thomas Bangalter helmet</p>
      <div class="art-showcase">
        <img
          alt="Daft Punk - Thomas Bangalter helmet"
          id="hero"
          src="/static/art/daft-punk/daft-punk.png"
        />
      </div>
    </div>
    <script>
      const img = document.getElementById("hero");
      const loader = document.getElementById("loader");
      if (img.complete) {
        loader.classList.add("done");
      } else {
        img.onload = () => loader.classList.add("done");
      }
      setTimeout(() => loader.classList.add("done"), 6000);
    </script>
  </body>
