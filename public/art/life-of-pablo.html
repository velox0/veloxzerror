<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life of Pablo - Velox0</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/art_page.css" />
  <meta property="og:title" content="Life of Pablo — Art by Velox0" />
  <meta property="og:description" content="Life of Pablo - Kanye West album" />
  <meta property="og:image" content="https://velox0.com/static/art/lop/lop.webp" />
  <meta property="og:url" content="https://velox0.com/art/life-of-pablo" />
  <meta name="description" content="Life of Pablo — Kanye West album cover render by Velox0" />
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">loading</div>
  </div>

  <div class="art_page">
    <a href="/art" class="back-link">← Art</a>
    <h1>Life of Pablo</h1>
    <p class="art-description">Life of Pablo - Kanye West album</p>

    <div class="art-showcase">
      <img id="hero" src="/static/art/lop/lop.png" alt="Life of Pablo - Kanye West album" />
    </div>
  </div>

  <script>
    const img = document.getElementById('hero');
    const loader = document.getElementById('loader');
    if (img.complete) { loader.classList.add('done'); }
    else { img.onload = () => loader.classList.add('done'); }
    setTimeout(() => loader.classList.add('done'), 6000);
  </script>
</body>
</html>
