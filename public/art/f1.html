<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>F1 - Velox0</title>
    <link href="/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="/static/art_page.css" rel="stylesheet" />
    <meta content="F1 — Art by Velox0" property="og:title" />
    <meta content="Formula 1 - car" property="og:description" />
    <meta
      content="https://velox0.com/static/art/f1/f1.webp"
      property="og:image"
    />
    <meta content="https://velox0.com/art/f1" property="og:url" />
    <meta content="Formula 1 car — 3D render by Velox0" name="description" />
    <link href="https://velox0.com/art/f1" rel="canonical" />
    <meta
      content="velox0, 3d art, systems, programming, backend, developer"
      name="keywords"
    />
  </head>
  <body>
    <!-- Loading overlay -->
    <div id="loader">
      <div class="spinner"></div>
      <div class="loader-text">loading</div>
    </div>
    <div class="art_page cinematic">
      <!-- Background video -->
      <video
        autoplay=""
        class="bg-video"
        id="bg-video"
        loop=""
        muted=""
        playsinline=""
      >
        <source src="/static/art/f1/bg.mp4" type="video/mp4" />
      </video>
      <div class="art_page-inner">
        <a class="back-link" href="/art">← Art</a>
        <h1>F1</h1>
        <p class="art-description">Formula 1 - car</p>
        <div class="center-video-wrap">
          <video autoplay="" id="main-video" loop="" playsinline="">
            <source
              src="/static/art/f1/fone_compressed.webm"
              type="video/webm"
            />
          </video>
        </div>
      </div>
    </div>
    <script>
      // Wait for all content to load before revealing
      const bgVideo = document.getElementById("bg-video");
      const mainVideo = document.getElementById("main-video");
      const loader = document.getElementById("loader");

      let bgReady = false;
      let mainReady = false;

      function checkReady() {
        if (bgReady && mainReady) {
          loader.classList.add("done");
          bgVideo.play().catch(() => {});
          mainVideo.play().catch(() => {});
        }
      }

      bgVideo.addEventListener("canplaythrough", () => {
        bgReady = true;
        checkReady();
      });

      mainVideo.addEventListener("canplaythrough", () => {
        mainReady = true;
        checkReady();
      });

      // Fallback: remove loader after 8 seconds max
      setTimeout(() => {
        loader.classList.add("done");
      }, 8000);
    </script>
  </body>
</html>
