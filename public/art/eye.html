<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Eye - Velox0</title>
    <link href="/favicon.ico" rel="icon" type="image/x-icon" />
    <link href="/static/art_page.css" rel="stylesheet" />
    <meta content="Eye — Art by Velox0" property="og:title" />
    <meta content="3d eye with geometry nodes" property="og:description" />
    <meta
      content="https://velox0.com/static/art/eye/eye.webp"
      property="og:image"
    />
    <meta content="https://velox0.com/art/eye" property="og:url" />
    <meta
      content="Eye — 3D eye with geometry nodes by Velox0"
      name="description"
    />
    <link href="https://velox0.com/art/eye" rel="canonical" />
    <meta
      content="velox0, 3d art, systems, programming, backend, developer"
      name="keywords"
    />
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div class="loader-text">loading</div>
    </div>
    <div class="art_page">
      <a class="back-link" href="/art">← Art</a>
      <h1>Eye</h1>
      <p class="art-description">3d eye with geometry nodes</p>
      <div class="art-showcase">
        <img
          alt="3d eye with geometry nodes"
          id="hero"
          src="/static/art/eye/eye.png"
        />
      </div>
    </div>
    <script>
      const img = document.getElementById("hero");
      const loader = document.getElementById("loader");
      if (img.complete) {
        loader.classList.add("done");
      } else {
        img.onload = () => loader.classList.add("done");
      }
      setTimeout(() => loader.classList.add("done"), 6000);
    </script>
  </body>
</html>
