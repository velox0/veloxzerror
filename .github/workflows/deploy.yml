name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Check Node syntax
        run: node --check index.js

      - name: Validate HTML
        run: npx --yes html-validate "public/**/*.html" || true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd ~/deploy/veloxzerror
            git fetch origin --depth 1
            git reset --hard origin/main
            npm install
            pm2 restart veloxzerror --silent || pm2 start npm --name veloxzerror --silent -- start
